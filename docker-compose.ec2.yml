# EC2 production overrides.
# Usage: docker compose -f docker-compose.yml -f docker-compose.ec2.yml up -d
#
# Design notes:
#  - Public traffic enters host Caddy on 443 and is reverse-proxied to the
#    container ports. The EC2 security group only opens 22/80/443 (+8443 for
#    Casdoor), so the app ports are unreachable directly.
#  - Casdoor is served on the lobechat hostname at :8443 (reusing the working
#    Let's Encrypt cert) instead of its own subdomain — DuckDNS's CAA lookups
#    were intermittently timing out on cert issuance for a 3rd hostname, so we
#    avoid needing a separate cert. OIDC issuer = https://<lobechat-host>:8443.
#  - Server-side OIDC + S3 calls stay on-box: extra_hosts pin the public
#    hostnames to the host gateway (valid cert via Caddy), no hair-pin to the EIP.
#  - LLM backend is a local Ollama (qwen2.5:3b) on the host — free, self-hosted,
#    no API credit needed. lobe-chat reaches it via host.docker.internal.

services:
  lobe-chat:
    environment:
      - APP_URL=https://alicenl-lobechat.duckdns.org
      - NEXTAUTH_URL=https://alicenl-lobechat.duckdns.org
      - AUTH_URL=https://alicenl-lobechat.duckdns.org
      - AUTH_CASDOOR_ISSUER=https://alicenl-lobechat.duckdns.org:8443
      - S3_ENDPOINT=https://alicenl-minio.duckdns.org
      - S3_PUBLIC_DOMAIN=https://alicenl-minio.duckdns.org
      # Local Ollama on the host (server-side fetch; see DB provider config)
      - ENABLED_OLLAMA=1
      - OLLAMA_PROXY_URL=http://host.docker.internal:11434
    extra_hosts:
      - "alicenl-lobechat.duckdns.org:host-gateway"
      - "alicenl-casdoor.duckdns.org:host-gateway"
      - "alicenl-minio.duckdns.org:host-gateway"
      - "host.docker.internal:host-gateway"

  minio:
    environment:
      - MINIO_API_CORS_ALLOW_ORIGIN=https://alicenl-lobechat.duckdns.org
      - MINIO_SERVER_URL=https://alicenl-minio.duckdns.org

  # Host-specific: requires /home/oriol/.ssh, which does not exist on EC2.
  linux-sandbox:
    profiles:
      - local
